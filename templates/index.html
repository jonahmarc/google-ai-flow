<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flow Generator</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
            background: #fff;
            color: #111;
        }

        h1 { font-size: 22px; margin-bottom: 24px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        textarea {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            resize: vertical;
            margin-bottom: 16px;
            outline: none;
            font-family: sans-serif;
            box-sizing: border-box;
        }

        textarea:focus { border-color: #333; }

        select {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-bottom: 16px;
            background: #fff;
            outline: none;
        }

        .image-upload-area {
            border: 1px dashed #ccc;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 16px;
            cursor: pointer;
            text-align: center;
            transition: border-color 0.15s;
        }

        .image-upload-area:hover { border-color: #333; }

        .image-upload-area.has-image {
            border-style: solid;
            border-color: #333;
            padding: 8px;
            text-align: left;
        }

        .image-upload-area p {
            margin: 0;
            font-size: 13px;
            color: #888;
        }

        #image-preview-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #image-preview {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #eee;
            display: none;
        }

        #image-filename {
            font-size: 13px;
            color: #333;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #image-remove {
            font-size: 12px;
            color: #888;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
        }

        #image-remove:hover { background: #f0f0f0; color: #333; }

        #image-input { display: none; }

        button[type=submit], #btn {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #btn:disabled {
            background: #999;
            cursor: not-allowed;
        }

        #status {
            margin-top: 12px;
            font-size: 13px;
            color: #555;
            min-height: 20px;
        }

        #status.error { color: #c00; }

        #result {
            margin-top: 24px;
            display: none;
        }

        #result img {
            width: 100%;
            border-radius: 8px;
            border: 1px solid #eee;
            display: block;
        }

        #result a {
            display: inline-block;
            margin-top: 10px;
            font-size: 13px;
            color: #111;
        }
    </style>
</head>
<body>

    <h1>Flow Image Generator</h1>

    <label for="prompt">Prompt</label>
    <textarea id="prompt" rows="4" placeholder="Describe the image..."></textarea>

    <label for="ratio">Aspect Ratio</label>
    <select id="ratio">
        <option value="landscape">Landscape</option>
        <option value="portrait">Portrait</option>
        <option value="square">Square</option>
    </select>

    <label>Reference Image (optional)</label>
    <div class="image-upload-area" id="upload-area" onclick="document.getElementById('image-input').click()">
        <div id="image-preview-wrap">
            <img id="image-preview" src="" alt="Preview" />
            <span id="image-filename"></span>
            <button id="image-remove" type="button" onclick="removeImage(event)" style="display:none">Remove</button>
        </div>
        <p id="upload-hint">Click to attach a reference image</p>
    </div>
    <input type="file" id="image-input" accept="image/*" onchange="handleImageSelect(event)" />

    <button id="btn" onclick="generate()">Generate</button>

    <div id="status"></div>

    <div id="result">
        <img id="img" src="" alt="Generated image" />
        <a id="link" href="#" target="_blank">Open full image</a>
    </div>

    <script>
        let selectedFile = null;

        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            selectedFile = file;

            const reader = new FileReader();
            reader.onload = (e) => {
                const preview = document.getElementById('image-preview');
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);

            document.getElementById('image-filename').textContent = file.name;
            document.getElementById('image-remove').style.display = 'inline';
            document.getElementById('upload-hint').style.display = 'none';
            document.getElementById('upload-area').classList.add('has-image');
        }

        function removeImage(event) {
            event.stopPropagation();
            selectedFile = null;
            document.getElementById('image-input').value = '';
            document.getElementById('image-preview').style.display = 'none';
            document.getElementById('image-preview').src = '';
            document.getElementById('image-filename').textContent = '';
            document.getElementById('image-remove').style.display = 'none';
            document.getElementById('upload-hint').style.display = 'block';
            document.getElementById('upload-area').classList.remove('has-image');
        }

        async function generate() {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) return alert('Please enter a prompt.');

            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const result = document.getElementById('result');

            btn.disabled = true;
            btn.textContent = 'Generating...';
            status.className = '';
            status.textContent = selectedFile
                ? 'Uploading image and generating... this may take ~45 seconds...'
                : 'This may take ~30 seconds...';
            result.style.display = 'none';

            const formData = new FormData();
            formData.append('prompt', prompt);
            formData.append('aspect_ratio', document.getElementById('ratio').value);
            if (selectedFile) {
                formData.append('image', selectedFile);
            }

            try {
                const res = await fetch('/generate', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.error) throw new Error(data.error);

                document.getElementById('img').src = data.image_url;
                document.getElementById('link').href = data.image_url;
                result.style.display = 'block';
                status.textContent = 'Done!';

            } catch (err) {
                status.className = 'error';
                status.textContent = 'Error: ' + err.message;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Generate';
            }
        }
    </script>

</body>
</html>
